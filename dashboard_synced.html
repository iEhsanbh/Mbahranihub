  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    apiKey: "AIzaSyBmfzGi_meuxUL6G9o0X5u3fufWEheuSWo",

    messagingSenderId: "205258612211",
    appId: "1:205258612211:web:357aa46c08b3f463a74686"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const stateDocRef = doc(db, "dashboard", "state");

  // Sign in anonymously so Firestore rules can check request.auth.uid.
  // Once signed in, the same UID persists in this browser (and you can copy
  // it into your security rules to lock the document to just this account).
  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log("Firebase UID:", user.uid); // copy this into firestore.rules once
      window.__firebase = { db, stateDocRef, getDoc, setDoc, onSnapshot };
      window.__firebaseReady = true;
      window.dispatchEvent(new Event("firebase-ready"));
    } else {
      signInAnonymously(auth).catch((err) => console.error("Auth error:", err));
    }
  });
</script>

  { category: "🗣️ مهارت‌های فردی", books: ["مهارت‌های سخنرانی", "حرفه‌ای سخن بگویید", "رهبری", "جامعه شناسی خودمانی", "خسرو خوبان"] },
  { category: "🩺 مرجع", books: ["راهنمای پزشکی خانواده"] },
  { category: "🐼 کوتاه و سرگرم‌کننده", books: ["پاندای بزرگ و اژدهای کوچک", "دید و بازدید", "جشن نیکوکاری", "هنر طبیعت", "نئودوربون"] },
];
let fb = null;
let pendingSaveTimer = null;
let firstSnapshotHandled = false;

function setSyncStatus(kind, text) {
  document.getElementById("sync-dot").className = "dot " + kind;
  document.getElementById("sync-text").textContent = text;
}

function mergeDefaults(data) {
  data = data || {};
  if (!data.schedule) data.schedule = {};
  if (!data.stages) data.stages = { violin: 0, python: 0, english: 0, acting: 0 };
  if (data.stages.acting === undefined) data.stages.acting = 0;
  if (!data.items) data.items = {};
  if (!data.media) data.media = [];
  if (!data.books) data.books = [];
  if (!data.readBooks) data.readBooks = {};
  if (!data.readTheaterBooks) data.readTheaterBooks = {};
  return data;
}

// Debounced write: always sends the LATEST in-memory state, never a stale copy.
function persist() {
  if (!fb) return;
  setSyncStatus("busy", "در حال ذخیره...");
  if (pendingSaveTimer) clearTimeout(pendingSaveTimer);
  pendingSaveTimer = setTimeout(async () => {
    try {
      await fb.setDoc(fb.stateDocRef, state);
      setSyncStatus("ok", "ذخیره شد");
    } catch (e) {
      setSyncStatus("err", "خطا در ذخیره — بدون اینترنت؟");
      console.error(e);
    }
  }, 350); // batches rapid clicks into one write instead of racing many writes
}

function initFirebaseSync() {
  fb = window.__firebase;
  setSyncStatus("busy", "در حال بار کردن داده...");

  fb.onSnapshot(fb.stateDocRef, { includeMetadataChanges: true }, (snap) => {
    // Ignore the optimistic local echo of OUR OWN pending write — it has hasPendingWrites=true
    // and would otherwise be treated as "new data from another device" even though it's just
    // our own setDoc bouncing back before the server confirms it.
    if (snap.metadata.hasPendingWrites) {
      return;
    }

    if (snap.exists()) {
      state = mergeDefaults(snap.data());
      render();
      if (firstSnapshotHandled) setSyncStatus("ok", "همگام‌سازی شد (تغییر از دستگاه دیگر)");
      else setSyncStatus("ok", "متصل شد");
    } else if (!firstSnapshotHandled) {
      // Only seed an empty doc on the very first load if nothing exists yet.
      fb.setDoc(fb.stateDocRef, state);
    }
    firstSnapshotHandled = true;
  }, (err) => {
    setSyncStatus("err", "اتصال برقرار نشد — تغییراتت فقط همینجا ذخیره می‌شه تا اتصال برگرده");
    console.error(err);
  });
}

let activeTab = "schedule";

function renderTabs(){
  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.toggle("active", tab.dataset.tab === activeTab);
  });
  document.querySelectorAll(".panel").forEach(p => {
    p.classList.toggle("active", p.id === "panel-" + activeTab);
  });
}

function renderSchedule() {
  const key = todayKey();
  const checked = state.schedule[key] || {};
  const el = document.getElementById("panel-schedule");
  let doneCount = 0;
  let html = `<div class="card">`;
  SCHEDULE.forEach((item, i) => {
    const isDone = !!checked[i];
    if (isDone) doneCount++;
    html += `
      <div class="row" style="padding:8px 0; ${i < SCHEDULE.length-1 ? 'border-bottom:0.5px solid #333' : ''}">
        <input type="checkbox" data-idx="${i}" ${isDone ? "checked" : ""} />
        <span class="time">${item[0]}</span>
        <span class="task ${isDone ? 'done' : ''}">${item[1]}</span>
      </div>`;
  });
  html += `</div>`;
  const pct = Math.round((doneCount / SCHEDULE.length) * 100);
  html = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; font-size:13px; color:#9a9890;">
        <span>پیشرفت امروز</span><span>${doneCount} از ${SCHEDULE.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>` + html;
  el.innerHTML = html;
  el.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", () => {
      if (!state.schedule[key]) state.schedule[key] = {};
      state.schedule[key][cb.dataset.idx] = cb.checked;
      persist();
      renderSchedule();
    });
  });
}

function renderTrack(panelId, storageKey, stages) {
  const currentStage = state.stages[storageKey] || 0;
  const itemKey = storageKey + "-" + currentStage;
  const checkedItems = state.items[itemKey] || {};
  const el = document.getElementById(panelId);

  let html = `<div class="card">
    <span class="stage-badge">مرحله ${currentStage + 1} از ${stages.length}</span>
    <div class="track-title">${stages[currentStage].title}</div>
  </div>`;

  stages[currentStage].items.forEach((item, i) => {
    const isDone = !!checkedItems[i];
    html += `
      <div class="card row">
        <input type="checkbox" data-item="${i}" ${isDone ? "checked" : ""} />
        <span class="task ${isDone ? 'done' : ''}">${item}</span>
      </div>`;
  });

  if (stages[currentStage].resources.length) {
    html += `<div class="card"><div class="label-sm">منابع پیشنهادی</div>`;
    stages[currentStage].resources.forEach(([label, url]) => {
      html += `<a class="resource" href="${url}" target="_blank">→ ${label}</a>`;
    });
    html += `</div>`;
  }

  html += `<div class="row" style="margin-top:12px; gap:8px;">`;
  if (currentStage > 0) html += `<button data-action="prev">مرحله قبل</button>`;
  if (currentStage < stages.length - 1) html += `<button data-action="next" class="primary">رفتن به مرحله بعد</button>`;
  else html += `<span class="empty-msg">به آخرین مرحله ثبت‌شده رسیدی! 🎉</span>`;
  html += `</div>`;

  el.innerHTML = html;

  const rerender = () => {
    renderTrack(panelId, storageKey, stages);
    if (panelId === "panel-acting") renderTheaterBooks();
  };

  el.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", () => {
      if (!state.items[itemKey]) state.items[itemKey] = {};
      state.items[itemKey][cb.dataset.item] = cb.checked;
      persist();
      rerender();
    });
  });
  const nextBtn = el.querySelector('[data-action="next"]');
  if (nextBtn) nextBtn.addEventListener("click", () => {
    state.stages[storageKey] = currentStage + 1;
    persist();
    rerender();
  });
  const prevBtn = el.querySelector('[data-action="prev"]');
  if (prevBtn) prevBtn.addEventListener("click", () => {
    state.stages[storageKey] = currentStage - 1;
    persist();
    rerender();
  });
}

function renderTheaterBooks() {
  const readTheaterBooks = state.readTheaterBooks || {};
  const el = document.getElementById("panel-acting");

  let html = `<div class="card">
    <div class="track-title" style="margin-bottom:2px;">📚 کتاب‌های تئاتر و بازیگری</div>
    <div class="label-sm" style="margin-bottom:8px;">به ترتیب پیشنهادی مطالعه — از عملی‌ترین شروع کن</div>
  </div>`;

  const sorted = [...THEATER_BOOKS].sort((a, b) => a.order - b.order);
  sorted.forEach((book) => {
    const isRead = !!readTheaterBooks[book.order];
    html += `
      <div class="card">
        <div class="row" style="align-items:flex-start;">
          <input type="checkbox" data-tbook="${book.order}" ${isRead ? "checked" : ""} style="margin-top:2px;" />
          <div style="flex:1;">
            <div class="task ${isRead ? 'done' : ''}" style="display:flex; align-items:center; gap:6px;">
              <span class="stage-badge" style="margin:0; padding:2px 8px;">${book.order}</span>
              ${book.title}
            </div>
            <div class="log-note" style="margin-top:4px;">${book.why}</div>
          </div>
        </div>
      </div>`;
  });

  el.insertAdjacentHTML("beforeend", html);

  el.querySelectorAll("[data-tbook]").forEach(cb => {
    cb.addEventListener("change", () => {
      if (!state.readTheaterBooks) state.readTheaterBooks = {};
      state.readTheaterBooks[cb.dataset.tbook] = cb.checked;
      persist();
      renderTrack("panel-acting", "acting", ACTING_STAGES);
      renderTheaterBooks();
    });
  });
}

function renderBooks() {
  const readBooks = state.readBooks || {};
  const entries = state.books || [];
  const el = document.getElementById("panel-books");

  let queueHtml = `<div class="card"><div class="track-title" style="margin-bottom:2px;">فهرست کتاب‌های تو (دسته‌بندی‌شده)</div><div class="label-sm" style="margin-bottom:8px;">تیک بزن وقتی خوندیش — خودش به یادداشت‌های پایین اضافه می‌شه</div>`;
  BOOK_QUEUE.forEach((cat, ci) => {
    queueHtml += `<div class="label-sm" style="margin-top:10px; color:#cecbf6;">${cat.category}</div>`;
    cat.books.forEach((book, bi) => {
      const key = ci + "-" + bi;
      const isRead = !!readBooks[key];
      queueHtml += `
        <div class="row" style="padding:4px 0;">
          <input type="checkbox" data-book="${key}" data-title="${book}" ${isRead ? "checked" : ""} style="width:18px;height:18px;" />
          <span style="font-size:13px; ${isRead ? 'text-decoration:line-through;color:#6a6860;' : ''}">${book}</span>
        </div>`;
    });
  });
  queueHtml += `</div>`;

  let html = queueHtml + `
    <div class="card">
      <div class="label-sm">عنوان کتاب (خارج از لیست بالا)</div>
      <input type="text" id="b-title" placeholder="اسم کتاب" />
      <div class="label-sm">یادداشت کوتاه</div>
      <textarea id="b-note" placeholder="حتی دو سه جمله کافیه..."></textarea>
      <button class="primary" id="b-add" style="margin-top:8px;">ثبت کردن</button>
    </div>
  `;

  if (entries.length === 0) {
    html += `<div class="empty-msg">هنوز یادداشتی برای کتاب‌ها ثبت نکردی.</div>`;
  } else {
    const indexed = entries.map((e, i) => ({ ...e, idx: i }));
    const sorted = indexed.sort((a,b) => b.date.localeCompare(a.date));
    let lastDate = "";
    sorted.forEach((e) => {
      if (e.date !== lastDate) {
        html += `<div class="day-divider">${e.date}</div>`;
        lastDate = e.date;
      }
      html += `
        <div class="card">
          <div class="log-entry">
            <div class="log-title">${e.title}</div>
            ${e.note ? `<div class="log-note">${e.note}</div>` : ""}
            <div style="text-align:left; margin-top:6px;"><span class="delete-btn" data-bidx="${e.idx}">حذف</span></div>
          </div>
        </div>`;
    });
  }

  el.innerHTML = html;

  el.querySelectorAll("[data-book]").forEach(cb => {
    cb.addEventListener("change", () => {
      if (!state.readBooks) state.readBooks = {};
      state.readBooks[cb.dataset.book] = cb.checked;
      if (cb.checked) {
        if (!state.books) state.books = [];
        state.books.push({ title: cb.dataset.title, note: "", date: todayKey() });
      }
      persist();
      renderBooks();
    });
  });

  document.getElementById("b-add").addEventListener("click", () => {
    const title = document.getElementById("b-title").value.trim();
    if (!title) return;
    const note = document.getElementById("b-note").value.trim();
    if (!state.books) state.books = [];
    state.books.push({ title, note, date: todayKey() });
    persist();
    renderBooks();
  });

  el.querySelectorAll("[data-bidx]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.books.splice(parseInt(btn.dataset.bidx), 1);
      persist();
      renderBooks();
    });
  });
}

function renderMedia() {
  const entries = state.media || [];
  const el = document.getElementById("panel-media");

  let html = `
    <div class="card">
      <div class="label-sm">نوع</div>
      <select id="m-type">
        <option value="فیلم">فیلم</option>
        <option value="سریال">سریال</option>
      </select>
      <div class="label-sm">عنوان</div>
      <input type="text" id="m-title" placeholder="اسم فیلم یا سریال" />
      <div class="label-sm">یادداشت کوتاه</div>
      <textarea id="m-note" placeholder="حتی دو سه جمله کافیه..."></textarea>
      <button class="primary" id="m-add" style="margin-top:8px;">ثبت کردن</button>
    </div>
  `;

  if (entries.length === 0) {
    html += `<div class="empty-msg">هنوز چیزی ثبت نکردی.</div>`;
  } else {
    const indexed = entries.map((e, i) => ({ ...e, idx: i }));
    const sorted = indexed.sort((a,b) => b.date.localeCompare(a.date));
    let lastDate = "";
    sorted.forEach((e) => {
      if (e.date !== lastDate) {
        html += `<div class="day-divider">${e.date}</div>`;
        lastDate = e.date;
      }
      html += `
        <div class="card">
          <div class="log-entry">
            <div class="log-title">${e.title} <span class="log-meta">(${e.type})</span></div>
            ${e.note ? `<div class="log-note">${e.note}</div>` : ""}
            <div style="text-align:left; margin-top:6px;"><span class="delete-btn" data-idx="${e.idx}">حذف</span></div>
          </div>
        </div>`;
    });
  }

  el.innerHTML = html;

  document.getElementById("m-add").addEventListener("click", () => {
    const title = document.getElementById("m-title").value.trim();
    if (!title) return;
    const type = document.getElementById("m-type").value;
    const note = document.getElementById("m-note").value.trim();
    if (!state.media) state.media = [];
    state.media.push({ title, type, note, date: todayKey() });
    persist();
    renderMedia();
  });

  el.querySelectorAll(".delete-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.media.splice(parseInt(btn.dataset.idx), 1);
      persist();
      renderMedia();
    });
  });
}

function render() {
  renderTabs();
  renderSchedule();
  renderTrack("panel-violin", "violin", VIOLIN_STAGES);
  renderTrack("panel-python", "python", PYTHON_STAGES);
  renderTrack("panel-english", "english", ENGLISH_STAGES);
  renderTrack("panel-acting", "acting", ACTING_STAGES);
  renderTheaterBooks();
  renderBooks();
  renderMedia();
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    activeTab = tab.dataset.tab;
    renderTabs();
  });
});

document.getElementById("today-date").textContent = new Date().toLocaleDateString("fa-IR", { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

// نمایش فوری صفحه با مقادیر پیش‌فرض، بدون منتظر ماندن برای اتصال فایربیس.
// اگه اتصال موفق بشه، render() دوباره با داده‌ی واقعی صدا زده می‌شه (در initFirebaseSync).
// اگه اتصال شکست بخوره یا طول بکشه، حداقل صفحه خالی نمی‌مونه.
render();

window.addEventListener("firebase-ready", initFirebaseSync);
if (window.__firebaseReady) initFirebaseSync();

// اگه بعد از ۸ ثانیه هنوز هیچ پاسخی (موفق یا خطا) از فایربیس نیومده باشه،
// به کاربر بگو که آفلاین کار می‌کنه (بدون اینکه چیزی رو قفل کند، چون render() از قبل اجرا شده).
setTimeout(() => {
  if (!firstSnapshotHandled) {
    setSyncStatus("err", "اتصال طول کشید — آفلاین کار می‌کنی، تغییراتت بعداً همگام می‌شه");
  }
}, 8000);
</script>
